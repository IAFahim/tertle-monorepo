name: Sync tertle repos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Clean old data
        run: |
          rm -rf .gitmodules
          git rm --cached -r . 2>/dev/null || true
          for repo in com.unity.netcode com.unity.entities com.bovinelabs.core com.bovinelabs.recast com.bovinelabs.anchor com.bovinelabs.bridge com.bovinelabs.timeline com.bovinelabs.reaction; do
            rm -rf "$repo"
          done

      - name: Clone all tertle repos
        run: |
          # Format: "repo_name:branch_or_tag"
          REPOS=(
            "com.unity.netcode:master"
            "com.unity.entities:main"
            "com.bovinelabs.core:1.6.1"
            "com.bovinelabs.recast:main"
            "com.bovinelabs.anchor:main"
            "com.bovinelabs.bridge:1.1.0"
            "com.bovinelabs.timeline:1.0.0"
            "com.bovinelabs.essence:main"
            "com.bovinelabs.reaction:2.0"
          )
          for entry in "${REPOS[@]}"; do
            repo="${entry%%:*}"
            ref="${entry##*:}"
            git clone --depth 1 --branch "$ref" "https://gitlab.com/tertle/$repo.git" "$repo" 2>&1 || echo "Failed to clone $repo@$ref"
            # Remove .gitattributes and .lfsconfig
            find "$repo" -name ".gitattributes" -delete
            find "$repo" -name ".lfsconfig" -delete
            # Remove LFS pointer stubs - scan all files for LFS header
            find "$repo" -type f | while read f; do
              if head -c 40 "$f" 2>/dev/null | grep -q '^version https://git-lfs'; then
                rm "$f"
              fi
            done
            rm -rf "$repo/.git"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs uninstall 2>/dev/null || true
          git add -A
          git diff --cached --quiet || git commit -m "sync: $(date -u +%Y-%m-%d_%H:%M)"
          git push
